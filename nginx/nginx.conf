# ═══════════════════════════════════════════════════════════════════
# CixioHub — Nginx Reverse Proxy
#
# LOCAL DEV  (path-based routing on http://localhost):
#   /          → frontend:3000
#   /api/      → backend:8000
#   /ai/       → ai:8003
#   /notify/   → notify:8001
#
# ═══════════════════════════════════════════════════════════════════

# ── Upstream service definitions ─────────────────────────────────────

upstream backend    { server backend:8000; }
upstream frontend   { server frontend:3000; }
upstream ai         { server ai:8003; }
upstream notify     { server notify:8001; }
upstream rabbitmq   { server rabbitmq:15672; }
upstream minio_api  { server minio:9000; }
upstream minio_ui   { server minio:9001; }
upstream mailhog    { server mailhog:8025; }

# ── LOCAL DEV — path-based routing on :80 ────────────────────────────

server {
    listen 80;
    server_name localhost;

    # ── Backend API + SSE streaming ──────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE streaming (chat endpoint)
        proxy_buffering             off;
        proxy_cache                 off;
        proxy_read_timeout          300s;
        proxy_send_timeout          300s;
        chunked_transfer_encoding   on;
    }

    # ── AI service ───────────────────────────────────────────────
    location /ai/ {
        rewrite ^/ai/(.*)$ /$1 break;
        proxy_pass http://ai;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_buffering             off;
        proxy_cache                 off;
        proxy_read_timeout          300s;
    }

    # ── Notify service ───────────────────────────────────────────
    location /notify/ {
        proxy_pass http://notify;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Frontend (Next.js) — catch-all ───────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}

