name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────────
  # Backend tests (Python / FastAPI)
  # ──────────────────────────────────────────────────
  test-backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: 
          POSTGRES_USER: 
          POSTGRES_PASSWORD: 
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://cixiohub:cixiohub@localhost:5432/cixiohub_test
          SECRET_KEY: test-secret-key-not-for-production
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────
  # Frontend build check (Next.js)
  # ──────────────────────────────────────────────────
  build-frontend:
    name: Frontend — next build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  # ──────────────────────────────────────────────────
  # Notify service tests
  # ──────────────────────────────────────────────────
  test-notify:
    name: Notify — pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: notify
        run: pip install -r requirements.txt

      - name: Run tests (if any)
        working-directory: notify
        run: |
          if [ -d tests ]; then pytest tests/ -v --tb=short; else echo "No tests yet"; fi

  # ──────────────────────────────────────────────────
  # Docker Compose validation
  # ──────────────────────────────────────────────────
  validate-compose:
    name: Infra — docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  # ──────────────────────────────────────────────────
  # AI Router validation
  # ──────────────────────────────────────────────────
  test-ai-router:
    name: AI Router — validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: ai/ai_router
        run: pip install -r requirements.txt

      - name: Run validation tests
        working-directory: ai/ai_router
        run: python tests/run_validation_test.py

  # ──────────────────────────────────────────────────
  # Terraform checks
  # ──────────────────────────────────────────────────
  validate-terraform:
    name: Terraform — fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate
