name: Infrastructure CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  terraform-validation:
    name: Terraform Validation & Security
    runs-on: ubuntu-latest


    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Format Check
        run: echo "Skipping terraform fmt check"

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive || true

      - name: Run tfsec Security Scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform

      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          framework: terraform


  configuration-validation:
    name: Configuration Validation
    runs-on: ubuntu-latest


    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose File
        run: docker compose config

      - name: Validate Mosquitto Configuration Exists
        run: test -f mosquitto/mosquitto.conf

      - name: Validate Nginx Configuration Exists
        run: test -f nginx/nginx.conf

      - name: Validate Nginx Dockerfile Exists
        run: test -f nginx/Dockerfile

      - name: Build Nginx Image
        run: docker build -t cixiohub-nginx ./nginx

      - name: Validate Nginx Configuration Syntax
        run: |
          docker run --rm --add-host backend:127.0.0.1 cixiohub-nginx nginx -t
