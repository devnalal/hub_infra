  #     MONGODB_URL: mongodb://${MONGO_ROOT_USER:-cixiohub}:${MONGO_ROOT_PASSWORD:-cixiohub}@mongodb:27017/${MONGO_INITDB_DATABASE:-cixiohub}
  #     REDIS_URL: redis://redis:6379/0 # No credentials for local Redis
  #     RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/
  #     AI_SERVICE_URL: http://ai:8003
  #     AWS_ENDPOINT_URL: http://minio:9000 # For local S3 (MinIO)
  #     SMTP_HOST: mailhog
  #     SMTP_PORT: 1025
  #   depends_on:
